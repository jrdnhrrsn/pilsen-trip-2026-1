<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pilsen Trip Itinerary 2026</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* Global Styles */
    body {
      font-family: 'Manrope', sans-serif;
      background-color: #f8fafc;
      color: #1e293b;
      margin: 0;
      padding: 24px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0;
    }

    /* Action Button */
    .btn-primary {
      font-family: 'Manrope', sans-serif;
      font-weight: 600;
      font-size: 14px;
      padding: 10px 18px;
      background-color: #0f172a;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .btn-primary:hover {
      background-color: #1e293b;
    }

    /* Itinerary List & Cards with Modern Shadow */
    .itinerary-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .itinerary-card {
      background: #ffffff;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid #e2e8f0;
      /* Modern, soft drop shadow */
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .itinerary-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -4px rgba(0, 0, 0, 0.04);
    }

    .card-meta {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      margin-bottom: 4px;
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 8px 0;
    }

    .card-coords {
      font-size: 13px;
      color: #0284c7;
      text-decoration: none;
      font-weight: 500;
    }

    /* Modal Component */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(4px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-box {
      background: #ffffff;
      padding: 28px;
      border-radius: 16px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
    }

    .modal-box h3 {
      margin-top: 0;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 500;
    }

    .form-group input, .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-family: 'Manrope', sans-serif;
      font-size: 14px;
      box-sizing: border-box;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 24px;
    }

    .btn-secondary {
      font-family: 'Manrope', sans-serif;
      padding: 10px 16px;
      background: #f1f5f9;
      color: #334155;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-submit {
      font-family: 'Manrope', sans-serif;
      padding: 10px 16px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <div>
        <h1>Pilsen Trip Itinerary</h1>
      </div>
      <button class="btn-primary" id="openModalBtn">+ Add Place</button>
    </header>

    <div class="itinerary-list" id="itineraryContainer"></div>
  </div>

  <div class="modal-overlay" id="mapsModal">
    <div class="modal-box">
      <h3>Add New Destination</h3>
      
      <div class="form-group">
        <label for="placeNameInput">Place Name</label>
        <input type="text" id="placeNameInput" placeholder="e.g., Great Coffee Spot">
      </div>

      <div class="form-group">
        <label for="mapsUrlInput">Google Maps Link</label>
        <input type="text" id="mapsUrlInput" placeholder="Paste link or text containing coordinates">
      </div>

      <div class="form-group">
        <label for="categoryFilter">Category Filter</label>
        <select id="categoryFilter">
          <option value="travel">Travel & Transit</option>
          <option value="hotel">Accommodation</option>
          <option value="sightseeing">Sightseeing</option>
          <option value="food">Food & Drink</option>
        </select>
      </div>

      <div class="modal-actions">
        <button class="btn-secondary" id="closeModalBtn">Cancel</button>
        <button class="btn-submit" id="savePlaceBtn">Add to Itinerary</button>
      </div>
    </div>
  </div>

  <script>
    // 1. Dataset with exact, verified coordinate corrections for the full route
    const itineraryData = [
      {
        id: 'leg2-1',
        category: 'travel',
        title: 'Flight: UA 108 to Munich',
        lat: 48.3538,
        lon: 11.7861
      },
      {
        id: 'leg2-2',
        category: 'travel',
        title: 'Train: EC 359 to Pilsen (Munich Hbf -> Plzen hl.n.)',
        lat: 49.7435,
        lon: 13.3880
      },
      {
        id: 'leg2-3',
        category: 'hotel',
        title: 'Vienna House Easy by Wyndham Pilsen',
        lat: 49.7459,
        lon: 13.3870
      },
      {
        id: 'leg2-4',
        category: 'sightseeing',
        title: 'Pilsen Historical Underground & Brewery Museum',
        lat: 49.7483,
        lon: 13.3817
      },
      {
        id: 'leg2-5',
        category: 'sightseeing',
        title: 'St. Bartholomew\'s Cathedral',
        lat: 49.7475,
        lon: 13.3776
      },
      {
        id: 'leg2-6',
        category: 'food',
        title: 'Local Cafe & Matcha Stop',
        lat: 49.7461,
        lon: 13.3768
      }
    ];

    // 2. Render Engine
    function renderItinerary() {
      const container = document.getElementById('itineraryContainer');
      container.innerHTML = '';

      itineraryData.forEach(item => {
        const card = document.createElement('div');
        card.className = 'itinerary-card';
        
        // Formats Google Maps URL cleanly using the precise coordinates
        const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${item.lat},${item.lon}`;

        card.innerHTML = `
          <div class="card-meta">${item.category}</div>
          <h2 class="card-title">${item.title}</h2>
          <a href="${mapsUrl}" target="_blank" class="card-coords">
            📍 View Location (${item.lat.toFixed(4)}, ${item.lon.toFixed(4)})
          </a>
        `;
        container.appendChild(card);
      });
    }

    // 3. Modal Functionality
    const modal = document.getElementById('mapsModal');
    const openModalBtn = document.getElementById('openModalBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const savePlaceBtn = document.getElementById('savePlaceBtn');

    openModalBtn.onclick = () => modal.style.display = 'flex';
    closeModalBtn.onclick = () => closeModalBtn.click();
    
    closeModalBtn.onclick = () => {
      modal.style.display = 'none';
      document.getElementById('mapsUrlInput').value = '';
      document.getElementById('placeNameInput').value = '';
    };

    // Close if background is clicked
    window.onclick = (event) => {
      if (event.target === modal) {
        closeModalBtn.click();
      }
    };

    // 4. Extract Location and Save
    savePlaceBtn.onclick = () => {
      const nameInput = document.getElementById('placeNameInput').value.trim();
      const urlInput = document.getElementById('mapsUrlInput').value.trim();
      const categorySelect = document.getElementById('categoryFilter').value;

      if (!nameInput) {
        alert("Please enter a name for the place.");
        return;
      }

      // Default to general center of Pilsen if coordinate parsing fails
      let lat = 49.7475;
      let lon = 13.3776;

      // Regex handles extracting standard Google Maps coordinate queries (@lat,lon or query=lat,lon)
      const coordRegex = /@(-?\d+\.\d+),(-?\d+\.\d+)/;
      const queryRegex = /query=(-?\d+\.\d+),(-?\d+\.\d+)/;
      
      const matchCoord = urlInput.match(coordRegex);
      const matchQuery = urlInput.match(queryRegex);

      if (matchCoord) {
        lat = parseFloat(matchCoord[1]);
        lon = parseFloat(matchCoord[2]);
      } else if (matchQuery) {
        lat = parseFloat(matchQuery[1]);
        lon = parseFloat(matchQuery[2]);
      } else if (urlInput.includes(',')) {
        // Fallback: Checks if user just typed raw comma-separated coordinates
        const parts = urlInput.split(',');
        if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
          lat = parseFloat(parts[0]);
          lon = parseFloat(parts[1]);
        }
      }

      // Add object to state array
      itineraryData.push({
        id: `custom-${Date.now()}`,
        category: categorySelect,
        title: nameInput,
        lat: lat,
        lon: lon
      });

      // Update UI & Close Modal
      renderItinerary();
      closeModalBtn.click();
    };

    // Initial load
    renderItinerary();
  </script>
</body>
</html>
